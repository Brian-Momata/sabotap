# Fly.io config for Sabotap.
# First deploy:
#   fly auth login
#   fly launch --copy-config --no-deploy   # accept or rename the app; keep this config
#   fly volumes create sabotap_data --size 1 --region jnb
#   fly deploy
#   fly scale count 1                      # rooms live in memory — must be a single machine
#
# "jnb" (Johannesburg) is the closest Fly region to East Africa; change
# primary_region if your players are elsewhere (https://fly.io/docs/reference/regions/).

app = "sabotap"
primary_region = "jnb"

[build]

[env]
  STORE_FILE = "/data/store.json"

[mounts]
  source = "sabotap_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Sleep when nobody is connected; wake on the first request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
